<!DOCTYPE HTML>
<html>

    <head>
       
        <title>Julia Fractals</title>

    </head>


    <style>
        
        body{
        
            background: black;
            color: white;

        }

        canvas{
        
            border: 1px solid white;

        }

        h4{
            position: absolute;
            top: 10%;
            left: 2%;
            margin: 3% 1%;
        }

        form{
            position: absolute;
            top: 16%;
            left: 2%;
            margin: 3% 1%;
        }

        #Gen{
            margin-top: 3%;
            font-size: 1.5em; 
            color:cornsilk;
            background:slategray;
            border-radius: 10px;
        }

    </style>

    <body>
        <center><h2>Julia Fractals</h2></center>
        <h4>Zoom = 1</h4>
        <form>
            <label for="RC">Real C: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
            <input type="text" id="RC" name="RealConstant"><br><br>
            <label for="IC">Imaginary C: </label>
            <input type="text" id="IC" name="ImaginaryConstant"><br><br>
            <label for="MI">Iterations: &nbsp;&nbsp;&nbsp;&nbsp;</label>
            <input type="text" id="MI" name="MaxIterations"><br><br>
            <input type="submit" id="Gen" value="Generate" style = "margin-bottom: 1%;">
        </form>
        <center><canvas></canvas></center>

    </body>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/5.6.0/math.min.js"></script>

    <script>

        var header = document.querySelector('h4')
        var canvas = document.querySelector('canvas')
        var ctx = canvas.getContext('2d')

        var width = 500
        var height = 450
        canvas.width = width
        canvas.height = height

        var mouseX = 0
        var mouseY = 0
        var clicked = false
        var pan_real = 0
        var pan_imaginary = 0
        var zoom = 1

        var constant_real = 0.28
        var constant_imaginary = 0.01
        var maxIterations = 64

        function julia(z_real, z_imaginary, i = 0) {
            
            tr = z_real
            z_real = (z_real)*(z_real) - (z_imaginary)*(z_imaginary)
            z_imaginary = 2*tr*(z_imaginary)
            z_real = z_real+constant_real
            z_imaginary = z_imaginary+constant_imaginary

            if((z_real)*(z_real) + (z_imaginary)*(z_imaginary)>4 || i==maxIterations)
                return i
            else
                return julia(z_real, z_imaginary, i+1)

        }

        function pointToColor(point_real, point_imaginary) {

            var iterations = julia(point_real, point_imaginary)
            var percentage = iterations/maxIterations

            var red = percentage * 255
            var green = percentage * 255
            var blue = percentage * 255

            return `rgb(${red}, ${green}, ${blue})`

        }

        function pixelToPoint(x, y) {
            
            var z_real = ((x/width)*2)-1
            var z_imaginary = 1-((y/height)*2)

            tr = z_real
            z_real = ((z_real)/zoom)
            z_imaginary = ((z_imaginary)/zoom)
            z_real = z_real+pan_real
            z_imaginary = z_imaginary+pan_imaginary
            var z = []
            z[0] = z_real
            z[1] = z_imaginary
            return z

        }

        function drawPixel(x, y, color) {
            
            ctx.fillStyle = color
            ctx.fillRect(x, y, 1, 1)

        }

        function draw() {
            
            for(var y = 0; y<height; y++){
                for(var x = 0; x<width; x++){
                    var point = pixelToPoint(x, y)
                    var color = pointToColor(point[0], point[1])

                    drawPixel(x, y, color)
                }
            }

        }

        function update() {
            
            header.innerHTML = constant_real.toString() + ' + ' + constant_imaginary.toString() + 'i at ' + zoom + 'X'
            draw()

        }

        function click(event) {
            
            if(!clicked){
                clicked = true
                return
            }

            mouseX = event.clientX - canvas.offsetLeft
            mouseY = event.clientY - canvas.offsetTop

            pan = pixelToPoint(mouseX, mouseY)
            pan_real = pan[0]
            pan_imaginary = pan[1]
            zoom *= 2

            update()

        }

        function move(event) {
            
            if(clicked){
                return
            }

            mouseX = event.clientX - canvas.offsetLeft
            mouseY = event.clientY - canvas.offsetTop

            constant = pixelToPoint(mouseX, mouseY)
            constant_real = constant[0]
            constant_imaginary = constant[1]

            constant_real = Math.round(constant_real*100)/100
            constant_imaginary = Math.round(constant_imaginary*100)/100

            update()

        }
        
        canvas.addEventListener('click',click)
        canvas.addEventListener('pointermove',move)

        update()

    </script>

</html>
