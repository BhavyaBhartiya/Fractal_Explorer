<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julia Fractals</title>
</head>
<style>
    body {
        background: black;
        color: white;
        font-size:medium;
        font-family:cursive;   
    }

    canvas {
        border: 1px solid white;
    }

    h3 {
        position: absolute;
        top: 60px;
        left: 35px;
    }

    h1 {
        margin: 0;
        margin-top: 2px;
        font-size: 2.5em;
        color: white;
    }

    canvas {
        position: absolute;
        margin: 0;
        top: 70px;
    }

    #input {
        position: absolute;
        top: 125px;
        left: 35px;
    }

    input{
        font-family:cursive;
        background:beige;
        border-radius: 5px;
        font-size:medium;
    }

    #Gen {
        font-size: 1.5em;
        color: cornsilk;
        background: slategray;
        border-radius: 15px;
        font-family:cursive;   
        padding: 10px 15px 10px 15px;
    }

    #plus {
        position: absolute;
        top: 330px;
        left: 193px;
        font-size: 1.4em;
        color: cornsilk;
        background: slategray;
        border-radius: 12px;
        border-color: black;
        padding: 5px 10px 5px 10px;
    }

    #minus {
        position: absolute;
        top: 330px;
        left: 255px;
        font-size: 1.4em;
        color: cornsilk;
        background: slategray;
        border-radius: 12px;
        padding: 5px 10px 5px 10px;
    }

    #cars{
        font-family:cursive;
        background:beige;
        border-radius: 5px;
        font-size:medium;
    }

    label{
        font-size:medium;
        font-family:cursive;   
    }
</style>

<body>
    <center><h1>Julia Fractals</h1></center>

    <h3></h3>

    <div id="input">
        <label for="RC">Real C: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
        <input type="text" id="RC" name="RC" required><br><br>
        <label for="IC">Imaginary C: </label>
        <input type="text" id="IC" name="IC" required><br><br>
        <label for="MI">Iterations: &nbsp;&nbsp;</label>
        <input type="text" id="MI" name="MI" required><br><br>
        <label for="cars" id="car">Theme: &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</label>
        <select name="cars" id="cars">
            <option value="0">GREYSCALE</option>
            <option value="1">AURORA</option>
            <option value="2">FIRE</option>
            <option value="3">PASTEL RAINBOW</option>
        </select><br><br>
        <button type="button" id="Gen" onclick="generate()">Generate</button>
    </div>

    <div id="ZOOM">
        <button type="button" id="plus" onclick="zoomin()">+</button>
        <button type="button" id="minus" onclick="zoomout()">−</button>
    </div>

    <canvas id="canv"></canvas>

    <script src="Julia.js"></script>
</body>

</html>
