<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Julia Fractals</title>
</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        background: radial-gradient((circle at top, #143d72 0%, #081a31 35%, #040d18 100%));
        color: white;
        font-family: "Segoe UI", Tahoma, sans-serif;
        overflow: hidden;
    }

    #input {
        position: absolute;
        left: 20px;
        top: 10px;
        width: 330px;
        height: calc(100vh - 30px);
        max-height: min-content;
        margin-top: calc((100vh - 550px)/2);
        padding: 20px;
        padding-top: 5px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        border-radius: 20px;
        background: rgba(12, 29, 52, 0.96);
        border: 1px solid rgba(90, 175, 255, 0.28);
        box-shadow: 0 16px 40px rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(14px);
        -webkit-backdrop-filter: blur(14px);
    }

    #Heading {
        margin: 0;
        text-align: center;
        font-size: 1.6rem;
        font-weight: 700;
        letter-spacing: 2px;
        color: white;
        text-shadow: 0 0 16px rgba(70, 170, 255, 0.3);
    }

    #Location {
        width: 100%;
        background: linear-gradient(180deg, rgba(32, 63, 99, 0.95), rgba(20, 42, 69, 0.95));
        border: 1px solid rgba(90, 170, 255, 0.3);
        border-radius: 14px;
        color: #ccecff;
        font-size: 0.9rem;
        overflow: hidden;
        white-space: nowrap;
        text-overflow: ellipsis;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        min-height: 33px;
        white-space: normal;
        overflow-wrap: anywhere;
        font-weight: 500;
        letter-spacing: 0.2px;
    }

    label {
        display: block;
        margin-bottom: 4px;
        color: #d8ebff;
        font-weight: 600;
        font-size: 0.95rem;
    }

    input {
        width: 100%;
        padding:8px 12px;
        padding-left: 16px;
        border-radius: 12px;
        border: 1px solid #396ea8;
        background: #081522;
        color: white;
        height:35px;
        font-size: 15px;
        transition: 0.2s;
    }

    input:hover {
        border-color: #5cbcff;
    }

    input:focus {
        outline: none;
        border-color: #69c8ff;
        box-shadow: 0 0 15px rgba(0, 150, 255, 0.35);
    }

    input::placeholder {
        color: #7ca9d8;
        opacity: 1;
    }

    #cars {
        width: 100%;
        padding:8px 12px;
        padding-left: 16px;
        height:42px;
        border-radius: 12px;
        border: 1px solid #396ea8;
        background: #081522;
        color: white;
        font-size: 15px;
        transition: 0.2s;
    }

    #cars:hover {
        border-color: #5cbcff;
    }

    #cars:focus {
        outline: none;
        border-color: #69c8ff;
    }

    #Gen {
        width: 100%;
        margin-top: 10px;
        padding: 12px;
        border: none;
        font-size: 1rem;
        border-radius: 14px;
        height: 46px;
        cursor: pointer;
        font-weight: 700;
        color: white;
        background: linear-gradient(180deg, #245e9d, #18497d);
        transition: 0.2s;
        letter-spacing: 0.5px;
    }

    #Gen:hover {
        transform: translateY(-2px);
        box-shadow: 0 10px 20px rgba(0, 120, 255, 0.4);
        filter: brightness(1.08);
    }

    #Gen:active {
        transform: translateY(0);
        filter: brightness(0.96);
    }

    #toolbar {
        margin-top: 10px;
        display: grid;
        grid-template-columns: 0.45fr 0.3fr 0.2fr;
        gap: 5px;
    }

    #plus,
    #minus {
        width: 42px;
        height: 42px;
        border: none;
        border-radius: 14px;
        cursor: pointer;
        font-size: 1.45rem;
        font-weight: 600;
        font-family: "Segoe UI", sans-serif;
        color: white;
        background: linear-gradient(180deg, #245e9d, #18497d);
        transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    #h{
        width: 35px;
        height: 35px;
        border: none;
        margin-top: 3px;
        margin-left: 15px;
        border-radius: 14px;
        cursor: pointer;
        font-size: 1.45rem;
        font-weight: 600;
        font-family: "Segoe UI", sans-serif;
        color: white; 
        background: linear-gradient(180deg, #618cb8, #277fdd);
        transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    }

    #plus {
        font-size: 1.7rem;
        padding-bottom: 18px;
    }

    #minus {
        font-size: 1.9rem;
        padding-bottom: 43px;
    }

    #plus:hover,
    #minus:hover,
    #h:hover {
        transform: translateY(-2px);
        background: linear-gradient(180deg, #3498ff, #236fc9);
        box-shadow: 0 10px 22px rgba(0, 140, 255, 0.35);
    }

    #plus:active,
    #minus:active,
    #h:active {
        transform: translateY(0);
    }

    canvas {
        position: absolute;
        top: 20px;
        border-radius: 18px;
        border: 2px solid rgba(90, 185, 255, 0.55);
        background: black;
        outline: 1px solid rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 25px rgba(0, 120, 255, 0.2), 0 15px 45px rgba(0, 0, 0, 0.45);
    }

    #bottomcontrols{
        margin-top: auto;
    }

    ::-webkit-scrollbar {
        width: 10px;
    }

    ::-webkit-scrollbar {
        background: #2b6db0;
        border-radius: 20px;
    }

    ::-webkit-scrollbar-track {
        background: #071322;
    }

    ::selection {
        background: #3ca8ff;
        color: white;
    }

    button,
    input,
    select,
    canvas {
        transition: 0.2s ease;
    }

    @media(min-width:1000px) {
        canvas {
            transition: box-shadow 0.25s, border-color 0.25s;
        }

        canvas:hover {
            border-color: #70c8ff;
            box-shadow: 0 0 35px rgba(0, 170, 255, 0.28), 0 18px 55px rgba(0, 0, 0, 0.5);
        }
    }

    @media(max-width:1000px) {
        #input {
            width: 320px;
            padding: 24px;
        }
    }
</style>

<body>

    <div id="input">

        <h1 id="Heading">Julia Fractals</h1>

        <h3 id="Location"></h3>

        <div class="section">

            <label for="RC">Real Constant</label>
            <input type="text" id="RC" name="RC" placeholder="0.2800" required>

        </div>

        <div class="section">

            <label for="IC">Imaginary Constant</label>
            <input type="text" id="IC" name="IC" placeholder="0.0100" required>

        </div>

        <div class="section">

            <label for="MI">Maximum Iterations</label>
            <input type="text" id="MI" name="MI" placeholder="256" required>

        </div>

        <div class="section">

            <label for="cars">Colouring Scheme</label>

            <select name="cars" id="cars">

                <option value="0">Greyscale</option>
                <option value="1">Aurora</option>
                <option value="2">Fire</option>
                <option value="3">Pastel Rainbow</option>

            </select>

        </div>

        <div id="bottomcontrols">

            <button type="button" id="Gen" onclick="generate()">Generate</button>

            <div id="toolbar">

                <div id="help">

                    <a target="_blank" href="help.html"><button id="h">?</button></a>

                </div>

                <button type="button" id="plus" onclick="zoomin()">+</button>
                <button type="button" id="minus" onclick="zoomout()">−</button>

            </div>

        </div>

    </div>

    <canvas id="canv"></canvas>

    <script src="Julia.js"></script>
</body>

</html>
